<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>베를린 런닝맨</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD0pC0tEpkDWnp34v7Xmj3DZnVzomGJPEQ",
  authDomain: "berlin-683dd.firebaseapp.com",
  projectId: "berlin-683dd",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>
</head>

<body style="text-align:center; font-family:sans-serif;">

<h1>🎮 주찬양 런닝맨 (베를린 보물찾기)</h1>

<input id="name" placeholder="이름 입력">
<br><br>

<button onclick="assignTeam()">🎲 팀 뽑기</button>
<button onclick="resetGame()">🔄 초기화</button>

<h2 id="result"></h2>

<pre id="teamsView"></pre>

<script>

const limits = { A:3, B:4, C:4 };

// 🔥 실시간 팀 상태 표시
db.collection("game").doc("teams").onSnapshot((doc) => {

  let teams = doc.data();

  document.getElementById("teamsView").innerText =
    "A팀 (" + teams.A.members.length + "/3): " + teams.A.members.join(", ") + "\n\n" +
    "B팀 (" + teams.B.members.length + "/4): " + teams.B.members.join(", ") + "\n\n" +
    "C팀 (" + teams.C.members.length + "/4): " + teams.C.members.join(", ");
});


// 🎯 팀 배정
async function assignTeam() {

  let name = document.getElementById("name").value.trim();
  if (!name) return alert("이름 입력!");

  const ref = db.collection("game").doc("teams");

  await db.runTransaction(async (t) => {

    const doc = await t.get(ref);
    let teams = doc.data();

    // 이미 배정된 사람
    for (let key of ["A","B","C"]) {
      if (teams[key].members.includes(name)) {

        document.getElementById("result").innerText =
          name + " → " + key + "팀 (이미 배정됨)";

        move(name);
        return;
      }
    }

    // 가능한 팀 찾기
    let available = ["A","B","C"].filter(
      t => teams[t].members.length < limits[t]
    );

    if (available.length === 0) {
      alert("팀 꽉 참!");
      return;
    }

    // 랜덤 배정
    let team = available[Math.floor(Math.random() * available.length)];

    teams[team].members.push(name);

    t.set(ref, teams);

    document.getElementById("result").innerText =
      "🎉 " + name + " → " + team + "팀";

    move(name);
  });
}


// 👉 게임 페이지 이동
function move(name) {
  setTimeout(() => {
    window.location.href = "game1.html?name=" + encodeURIComponent(name);
  }, 1000);
}


// 🔥 초기화 기능
async function resetGame() {

  if (!confirm("진짜 초기화할까?")) return;

  const ref = db.collection("game").doc("teams");

  await ref.set({
    A: { members: [], step: 0 },
    B: { members: [], step: 0 },
    C: { members: [], step: 0 }
  });

  alert("초기화 완료!");
}

</script>

</body>
</html>
